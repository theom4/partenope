// ─── NOTIFICATIONS ──────────────────────────────────────────────────────────
function useNotifications(){
  const[notifs,setNotifs]=useState([]);
  const add=useCallback((msg,type='success')=>{
    const id=Date.now()+Math.random();
    setNotifs(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),3200);
  },[]);
  return{notifs,add};
}

// ─── UPSELL ENGINE ──────────────────────────────────────────────────────────
function getUpsell(cartItems,orderHistory,catalog){
  const cartIds=cartItems.map(i=>i.id);
  const historyIds=orderHistory.flatMap(o=>o.items.map(i=>i.id));
  const suggestions=new Map();
  cartIds.forEach(id=>{
    const prod=catalog.find(p=>p.id===id);
    if(prod?.pairsWith)prod.pairsWith.forEach(pid=>{
      if(!cartIds.includes(pid)){const p=catalog.find(p2=>p2.id===pid);if(p)suggestions.set(pid,{...p,reason:`Souvent acheté avec ${prod.name.split(' ').slice(0,3).join(' ')}`})}
    });
  });
  const hasTypes=(types)=>types.every(t=>cartIds.some(id=>catalog.find(p=>p.id===id)?.tags?.includes(t)));
  if(hasTypes(['pasta','tomate'])&&!cartIds.includes('sal2')){const p=catalog.find(p=>p.id==='sal2');if(p)suggestions.set('sal2',{...p,reason:'Complétez la recette: parmesan 🍝'})}
  if(cartIds.some(id=>catalog.find(p=>p.id===id)?.cat==='Pasta')&&!cartIds.includes('ali2')){const p=catalog.find(p=>p.id==='ali2');if(p)suggestions.set('ali2',{...p,reason:"Idéal avec les pâtes: huile d'olive"})}
  const recentIds=orderHistory.slice(-2).flatMap(o=>o.items.map(i=>i.id));
  historyIds.filter(id=>!recentIds.includes(id)&&!cartIds.includes(id)).slice(0,2).forEach(id=>{const p=catalog.find(p2=>p2.id===id);if(p&&!suggestions.has(id))suggestions.set(id,{...p,reason:'Commandé précédemment'})});
  return Array.from(suggestions.values()).slice(0,6);
}

// ─── MAP COMPONENT (fixed mount/unmount) ─────────────────────────────────────
function DeliveryMap({orders,singleOrderId}){
  const mapRef=useRef(null);
  const mapInstanceRef=useRef(null);
  const markersRef=useRef([]);

  const deliveryOrders=useMemo(()=>{
    return singleOrderId
      ? orders.filter(o=>o.id===singleOrderId&&o.status==='en_livraison')
      : orders.filter(o=>o.status==='en_livraison');
  },[orders,singleOrderId]);

  // Init map
  useEffect(()=>{
    if(!mapRef.current)return;
    // Small delay to ensure DOM is ready
    const timer=setTimeout(()=>{
      if(mapInstanceRef.current)return;
      try{
        const map=L.map(mapRef.current,{scrollWheelZoom:true,zoomControl:true}).setView([48.86,2.35],11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
        mapInstanceRef.current=map;
        // Force size recalc
        setTimeout(()=>map.invalidateSize(),200);
      }catch(e){console.warn('Map init error',e)}
    },100);
    return()=>{
      clearTimeout(timer);
      if(mapInstanceRef.current){
        try{mapInstanceRef.current.remove()}catch{}
        mapInstanceRef.current=null;
      }
    };
  },[]);

  // Update markers
  useEffect(()=>{
    const map=mapInstanceRef.current;
    if(!map)return;
    markersRef.current.forEach(m=>{try{map.removeLayer(m)}catch{}});
    markersRef.current=[];

    const depotIcon=L.divIcon({html:'<div style="background:#27AE60;color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.3)">🏭</div>',className:'',iconAnchor:[16,16]});
    const dm=L.marker([DEPOT.lat,DEPOT.lng],{icon:depotIcon}).addTo(map).bindPopup(DEPOT.name);
    markersRef.current.push(dm);

    deliveryOrders.forEach(order=>{
      const rest=MOCK_RESTAURANTS.find(r=>r.id===order.restaurantId)||MOCK_RESTAURANTS[0];
      const progress=order.deliveryProgress||0;
      const curLat=DEPOT.lat+(rest.lat-DEPOT.lat)*progress;
      const curLng=DEPOT.lng+(rest.lng-DEPOT.lng)*progress;

      const truckIcon=L.divIcon({html:'<div style="background:#C0392B;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(0,0,0,0.4);border:2px solid white">🚚</div>',className:'',iconAnchor:[18,18]});
      const restIcon=L.divIcon({html:`<div style="background:#2980B9;color:white;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:bold;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.3)">🍽️ ${rest.name.split(' ').slice(0,2).join(' ')}</div>`,className:'',iconAnchor:[0,0]});

      const tm=L.marker([curLat,curLng],{icon:truckIcon}).addTo(map).bindPopup(`Commande #${order.id.slice(-4)} — ETA: ${Math.round((1-progress)*45)} min`);
      const rm=L.marker([rest.lat,rest.lng],{icon:restIcon}).addTo(map).bindPopup(rest.address);
      const line=L.polyline([[DEPOT.lat,DEPOT.lng],[rest.lat,rest.lng]],{color:'#C0392B',weight:2,dashArray:'6,4',opacity:0.6}).addTo(map);
      markersRef.current.push(tm,rm,line);
    });

    try{map.invalidateSize()}catch{}
  },[deliveryOrders]);

  const eta=deliveryOrders.length>0?Math.round((1-(deliveryOrders[0]?.deliveryProgress||0))*45):null;

  return(
    <div className="relative">
      <div ref={mapRef} style={{height:'300px',borderRadius:'12px',zIndex:1}} className="sm:!h-[400px]"/>
      {eta!==null&&(
        <div className="absolute top-2 left-2 bg-white/95 backdrop-blur rounded-xl shadow-lg px-3 py-2 z-10">
          <div className="text-[10px] text-gray-500 font-medium">ETA estimé</div>
          <div className="text-xl font-bold text-partenope-red">{eta} <span className="text-xs font-normal text-gray-600">min</span></div>
        </div>
      )}
      {deliveryOrders.length===0&&(
        <div className="absolute inset-0 flex items-center justify-center bg-black/20 rounded-xl z-10">
          <div className="bg-white rounded-xl px-4 py-3 text-center shadow-lg">
            <div className="text-2xl mb-1">🚚</div>
            <div className="font-semibold text-gray-700 text-sm">Aucune livraison active</div>
            <div className="text-xs text-gray-500">Passez des commandes en "En livraison"</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CART SIDEBAR (full-screen on mobile) ───────────────────────────────────
function CartSidebar({cart,setCart,catalog,orderHistory,loyalty,onCheckout,onClose}){
  const upsell=useMemo(()=>getUpsell(cart,orderHistory,catalog),[cart,orderHistory,catalog]);
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const pts=Math.floor(total/POINT_RATIO);
  const level=getLoyaltyLevel(loyalty.points);
  const nextLevel=getNextLevel(loyalty.points);
  const discount=level.discount;
  const totalAfter=total*(1-discount/100);

  const updateQty=(id,delta)=>{setCart(p=>p.map(i=>i.id===id?{...i,qty:Math.max(0,i.qty+delta)}:i).filter(i=>i.qty>0))};
  const remove=(id)=>setCart(p=>p.filter(i=>i.id!==id));

  return(
    <div className="fixed inset-0 z-50 flex justify-end">
      <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={onClose}/>
      <div className="relative bg-white w-full sm:max-w-md flex flex-col shadow-2xl animate-slide-right overflow-y-auto" style={{maxHeight:'100dvh'}}>
        <div className="sticky top-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between z-10">
          <div>
            <h2 className="font-serif font-bold text-lg sm:text-xl text-gray-900">Mon Panier</h2>
            <div className="text-[11px] text-gray-500">{cart.length} article{cart.length!==1?'s':''}</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600">✕</button>
        </div>

        {nextLevel&&(
          <div className="px-4 py-2.5 bg-gradient-to-r from-amber-50 to-yellow-50 border-b border-amber-100">
            <div className="flex items-center justify-between mb-1">
              <span className="text-[11px] font-semibold text-amber-700">{level.icon} {level.name} · {loyalty.points} pts</span>
              <span className="text-[11px] text-amber-600">{nextLevel.icon} {nextLevel.name} à {nextLevel.min} pts</span>
            </div>
            <div className="h-1.5 bg-amber-100 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-amber-400 to-amber-500 rounded-full progress-bar" style={{width:`${Math.min(100,(loyalty.points/nextLevel.min)*100)}%`}}/>
            </div>
            <div className="text-[10px] text-amber-600 mt-0.5">+{pts} pts avec cette commande</div>
          </div>
        )}

        <div className="flex-1 px-4 py-3 space-y-2">
          {cart.length===0?(
            <div className="flex flex-col items-center justify-center py-12 text-center">
              <div className="text-5xl mb-3">🛒</div>
              <div className="font-semibold text-gray-600">Votre panier est vide</div>
              <div className="text-sm text-gray-400 mt-1">Ajoutez des produits</div>
            </div>
          ):(
            cart.map(item=>(
              <div key={item.id} className="flex gap-2 p-2.5 bg-gray-50 rounded-xl border border-gray-100">
                <div className="w-12 h-12 rounded-lg overflow-hidden flex-shrink-0">
                  <img src={item.img} alt="" className="w-full h-full object-cover"/>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-[11px] font-semibold text-gray-800 leading-snug line-clamp-2">{item.name}</div>
                  <div className="text-partenope-red font-bold text-xs mt-0.5">{item.price.toFixed(2)} €</div>
                </div>
                <div className="flex flex-col items-end gap-1">
                  <button onClick={()=>remove(item.id)} className="text-gray-300 hover:text-partenope-red text-xs leading-none">✕</button>
                  <div className="flex items-center gap-1.5">
                    <button onClick={()=>updateQty(item.id,-1)} className="w-6 h-6 rounded-full bg-gray-200 active:bg-partenope-red active:text-white text-sm font-bold flex items-center justify-center">-</button>
                    <span className="text-xs font-bold w-4 text-center">{item.qty}</span>
                    <button onClick={()=>updateQty(item.id,1)} className="w-6 h-6 rounded-full bg-gray-200 active:bg-partenope-blue active:text-white text-sm font-bold flex items-center justify-center">+</button>
                  </div>
                  <div className="text-[10px] text-gray-500">{(item.price*item.qty).toFixed(2)} €</div>
                </div>
              </div>
            ))
          )}
        </div>

        {upsell.length>0&&cart.length>0&&(
          <div className="px-4 py-2.5 border-t border-gray-100 bg-gradient-to-b from-white to-gray-50">
            <div className="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">✨ Vous pourriez aimer</div>
            <div className="space-y-1.5">
              {upsell.slice(0,3).map(p=>(
                <ProductCard key={p.id} product={p} onAdd={(prod)=>{
                  const exists=cart.find(i=>i.id===prod.id);
                  if(exists)setCart(prev=>prev.map(i=>i.id===prod.id?{...i,qty:i.qty+1}:i));
                  else setCart(prev=>[...prev,{...prod,qty:1}]);
                }} compact/>
              ))}
            </div>
          </div>
        )}

        {cart.length>0&&(
          <div className="sticky bottom-0 bg-white border-t border-gray-200 px-4 py-3 pb-safe">
            {total<MIN_ORDER&&(
              <div className="mb-2 flex items-center gap-1.5 text-[11px] bg-amber-50 border border-amber-200 text-amber-700 rounded-lg px-2.5 py-1.5">
                <span>⚠️</span><span>Minimum: <b>{MIN_ORDER}€</b> — Il manque <b>{(MIN_ORDER-total).toFixed(2)}€</b></span>
              </div>
            )}
            {discount>0&&<div className="flex justify-between text-xs mb-0.5"><span className="text-gray-500">Sous-total</span><span className="line-through text-gray-400">{total.toFixed(2)} €</span></div>}
            {discount>0&&<div className="flex justify-between text-xs mb-0.5 text-partenope-blue"><span>-{discount}% {level.name}</span><span>-{(total*discount/100).toFixed(2)} €</span></div>}
            <div className="flex justify-between font-bold text-base sm:text-lg mb-3">
              <span>Total</span><span className="text-partenope-red">{totalAfter.toFixed(2)} €</span>
            </div>
            <button onClick={()=>{if(total>=MIN_ORDER)onCheckout()}} disabled={total<MIN_ORDER}
              className={`w-full py-3 rounded-xl font-bold text-white transition-all text-sm ${total>=MIN_ORDER?'bg-partenope-red active:bg-partenope-red-dark shadow-lg active:scale-95':'bg-gray-300 cursor-not-allowed'}`}>
              {total>=MIN_ORDER?`Commander — ${totalAfter.toFixed(2)} €`:'Minimum non atteint'}
            </button>
            <div className="text-center text-[10px] text-gray-400 mt-1">+{pts} points de fidélité</div>
          </div>
        )}
      </div>
    </div>
  );
}

        {LOYALTY_LEVELS.map(l=>(
          <div key={l.name} className={`rounded-xl p-3 border-2 text-center ${loyalty.points>=l.min?'':'opacity-50'}`} style={{borderColor:l.color,background:l.bg}}>

            <div className="font-bold text-xs" style={{color:l.color}}>{l.name}</div>
            <div className="text-[10px] text-gray-600 mt-0.5">{l.min} pts</div>

            {l.freeDelivery&&<div className="text-[10px] text-partenope-blue font-semibold mt-0.5">🚚</div>}
          </div>
        ))}

      {loyalty.history.length>0&&(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-100 font-semibold text-gray-800 text-sm">Historique</div>
          <div className="divide-y divide-gray-50">
            {[...loyalty.history].reverse().map((h,i)=>(
              <div key={i} className="px-4 py-2.5 flex items-center justify-between">
                <div><div className="text-xs font-medium text-gray-700">{h.desc}</div><div className="text-[10px] text-gray-400">{new Date(h.date).toLocaleDateString('fr-FR')}</div></div>
                <div className={`font-bold text-xs ${h.points>0?'text-partenope-blue':'text-partenope-red'}`}>{h.points>0?'+':''}{h.points} pts</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TRACKING VIEW ──────────────────────────────────────────────────────────
function TrackingView({orderId,orders,onClose}){
  const order=orders.find(o=>o.id===orderId);
  const progress=order?.deliveryProgress||0;
  const eta=Math.round((1-progress)*45);
  return(
    <div className="max-w-2xl mx-auto px-3 sm:px-4 py-6 animate-fade-in">
      <button onClick={onClose} className="flex items-center gap-2 text-partenope-red font-medium mb-4 text-sm">← Retour</button>
      <div className="flex items-center justify-between mb-4">
        <h1 className="font-serif text-xl sm:text-2xl font-bold text-gray-900">Suivi de livraison</h1>
        <div className="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold">🚚 En route</div>
      </div>
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-4">
        <div className="flex items-center gap-3 mb-3">
          <div className="text-3xl">⏱️</div>
          <div><div className="text-[10px] text-gray-500 uppercase font-medium">Arrivée estimée</div><div className="text-2xl sm:text-3xl font-bold text-partenope-red">{eta} min</div></div>
        </div>
        <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-full bg-gradient-to-r from-purple-500 to-partenope-red rounded-full progress-bar" style={{width:`${progress*100}%`}}/>
        </div>
        <div className="flex justify-between text-[10px] text-gray-400 mt-1"><span>🏭 Dépôt</span><span>🍽️ Restaurant</span></div>
      </div>
      <DeliveryMap orders={orders} singleOrderId={orderId}/>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const[catalog,setCatalog]=useState(()=>S.get('ptn2_catalog',INITIAL_CATALOG));
  const[orders,setOrders]=useState(()=>{
    const saved=S.get('ptn2_orders',null);
    if(saved&&saved.length>0)return saved;
    return generateSeedOrders(INITIAL_CATALOG);
  });
  const[cart,setCart]=useState(()=>S.get('ptn2_cart',[]));
  const[loyalty,setLoyalty]=useState(()=>S.get('ptn2_loyalty',{points:120,history:[{desc:'Commande bienvenue',points:120,date:new Date(Date.now()-86400000*5).toISOString()}]}));
  const[currentRestaurant]=useState(MOCK_RESTAURANTS[0]);

  const[role,setRole]=useState('client');
  const[view,setView]=useState('catalog');
  const[activeCat,setActiveCat]=useState('Tous');
  const[search,setSearch]=useState('');
  const[showCart,setShowCart]=useState(false);
  const[showCheckout,setShowCheckout]=useState(false);
  const[trackingId,setTrackingId]=useState(null);
  const[cartPulse,setCartPulse]=useState(false);
  const{notifs,add:notify}=useNotifications();

  useEffect(()=>{S.set('ptn2_catalog',catalog)},[catalog]);
  useEffect(()=>{S.set('ptn2_orders',orders)},[orders]);
  useEffect(()=>{S.set('ptn2_cart',cart)},[cart]);
  useEffect(()=>{S.set('ptn2_loyalty',loyalty)},[loyalty]);

  // Simulate delivery progress
  useEffect(()=>{
    const iv=setInterval(()=>{
      setOrders(p=>p.map(o=>{
        if(o.status==='en_livraison'&&(o.deliveryProgress||0)<1){
          const np=Math.min(1,(o.deliveryProgress||0)+0.008);
          if(np>=1)return{...o,deliveryProgress:1,status:'livree'};
          return{...o,deliveryProgress:np};
        }
        return o;
      }));
    },2000);
    return()=>clearInterval(iv);
  },[]);

  const addToCart=useCallback((product)=>{
    setCart(prev=>{const ex=prev.find(i=>i.id===product.id);if(ex)return prev.map(i=>i.id===product.id?{...i,qty:i.qty+1}:i);return[...prev,{...product,qty:1}]});
    setCartPulse(true);setTimeout(()=>setCartPulse(false),500);
    notify(`${product.name.split(' ').slice(0,3).join(' ')} ajouté`);
  },[notify]);

  const handleCheckout=()=>{setShowCart(false);setShowCheckout(true)};
  const handleConfirmOrder=()=>{
    const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
    const level=getLoyaltyLevel(loyalty.points);
    const finalTotal=total*(1-level.discount/100);
    const pts=Math.floor(total/POINT_RATIO);
    const newOrder={id:Date.now().toString(),date:new Date().toISOString(),items:cart.map(i=>({...i})),total:finalTotal,status:'recue',restaurantId:currentRestaurant.id,pointsEarned:pts,deliveryProgress:0};
    setOrders(p=>[...p,newOrder]);
    setLoyalty(p=>({points:p.points+pts,history:[...p.history,{desc:`Commande #${newOrder.id.slice(-6)}`,points:pts,date:newOrder.date}]}));
    setCart([]);setShowCheckout(false);setView('orders');
    notify(`Commande confirmée! +${pts} pts 🎉`);
  };
  const handleRepeatOrder=(order)=>{
    const valid=order.items.filter(item=>catalog.find(p=>p.id===item.id)?.stock>0);
    setCart(valid.map(i=>({...i})));setView('catalog');setShowCart(true);
    notify('Commande chargée dans le panier ✓');
  };

  const filteredProducts=useMemo(()=>{
    let p=catalog.filter(p=>p.active!==false);
    if(activeCat!=='Tous')p=p.filter(x=>x.cat===activeCat);
    if(search.trim()){const q=search.toLowerCase();p=p.filter(x=>x.name.toLowerCase().includes(q)||x.cat.toLowerCase().includes(q)||x.tags?.some(t=>t.includes(q)))}
    return p;
  },[catalog,activeCat,search]);

  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const cartTotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const loyaltyLevel=getLoyaltyLevel(loyalty.points);

  // Tracking view
  if(trackingId)return(
    <div className="min-h-screen bg-partenope-cream">
      <NotificationStack notifs={notifs}/>
      <header className="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 py-2.5 flex items-center gap-2">
          <img src="images/logo.png" alt="Partenope Logo" className="h-8 w-auto object-contain" />
        </div>
      </header>
      <main className="max-w-7xl mx-auto"><TrackingView orderId={trackingId} orders={orders} onClose={()=>setTrackingId(null)}/></main>
    </div>
  );

  // Checkout view
  if(showCheckout)return(
    <div className="min-h-screen bg-partenope-cream">
      <NotificationStack notifs={notifs}/>
      <header className="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 py-2.5 flex items-center gap-2">
          <img src="images/logo.png" alt="Partenope Logo" className="h-8 w-auto object-contain" />
        </div>
      </header>
      <main className="max-w-7xl mx-auto">
        <CheckoutView cart={cart} catalog={catalog} orderHistory={orders.filter(o=>o.restaurantId===currentRestaurant.id)} loyalty={loyalty} onConfirm={handleConfirmOrder} onBack={()=>{setShowCheckout(false);setShowCart(true)}}/>
      </main>
    </div>
  );

  return(
    <div className="min-h-screen bg-partenope-cream pb-16 sm:pb-0">
      <NotificationStack notifs={notifs}/>

      {/* ── HEADER ── */}
      <header className="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-3 sm:px-4">
          <div className="flex items-center justify-between py-2 sm:py-3">
            {/* Logo */}
            <div className="flex items-center gap-2">

              <div className="hidden sm:block">

              </div>

              <div className="hidden md:flex flex-1 max-w-sm mx-6">
                <div className="relative w-full">
                  <input type="text" placeholder="Rechercher un produit..." value={search} onChange={e=>setSearch(e.target.value)}
                    className="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-xl text-sm focus:border-partenope-red focus:outline-none focus:ring-2 focus:ring-partenope-red/20 bg-gray-50"/>
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
                </div>
              </div>
            )}

            {/* Right controls */}
            <div className="flex items-center gap-2">
              {role==='client'&&(
                <button onClick={()=>setView('loyalty')} className="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-amber-200 bg-amber-50">
                  <span className="text-sm">{loyaltyLevel.icon}</span>
                  <span className="text-[11px] font-bold text-amber-700">{loyalty.points}</span>
                </button>

            <div className="flex flex-wrap gap-2 mt-3">
              <div className="flex items-center gap-1 text-[11px] sm:text-sm bg-white/10 px-2.5 py-1 sm:px-4 sm:py-2 rounded-full backdrop-blur-sm">🚚 Livraison L/M/V</div>
              <div className="flex items-center gap-1 text-[11px] sm:text-sm bg-white/10 px-2.5 py-1 sm:px-4 sm:py-2 rounded-full backdrop-blur-sm">💶 Min. {MIN_ORDER}€</div>
              <div className="flex items-center gap-1 text-[11px] sm:text-sm bg-white/10 px-2.5 py-1 sm:px-4 sm:py-2 rounded-full backdrop-blur-sm">⭐ Fidélité</div>
            </div>
          </div>
        </div>
      )}

      {/* ── MAIN ── */}
      <main className="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
        {role==='admin'&&<AdminDashboard orders={orders} catalog={catalog} setCatalog={setCatalog} setOrders={setOrders} notify={notify}/>}

        {role==='client'&&view==='catalog'&&(
          <div>
            {/* Categories */}
            <div className="flex gap-1.5 sm:gap-2 overflow-x-auto pb-2 mb-4 scroll-hide">
              {CATEGORIES.map(cat=>(
                <button key={cat} onClick={()=>setActiveCat(cat)}
                  className={`flex-shrink-0 flex items-center gap-1 sm:gap-2 px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full text-[11px] sm:text-sm font-semibold border-2 transition-all ${activeCat===cat?'bg-partenope-red border-partenope-red text-white shadow-md':'bg-white border-gray-200 text-gray-600 active:border-partenope-red/50'}`}>
                  <span>{CAT_ICONS[cat]}</span><span>{cat}</span>
                </button>
              ))}
            </div>

            {/* Mobile search */}
            <div className="md:hidden mb-3">
              <div className="relative">
                <input type="text" placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)}
                  className="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-xl text-sm focus:border-partenope-red focus:outline-none bg-white"/>
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
              </div>
            </div>

            <div className="flex items-center justify-between mb-3">
              <div className="text-xs text-gray-500">{filteredProducts.length} produit{filteredProducts.length!==1?'s':''}</div>
              {cartTotal>0&&cartTotal<MIN_ORDER&&(
                <div className="text-[10px] bg-amber-50 border border-amber-200 text-amber-700 px-2 py-1 rounded-full font-medium">
                  Encore {(MIN_ORDER-cartTotal).toFixed(0)}€
                </div>
              )}
            </div>

            {filteredProducts.length===0?(
              <div className="text-center py-12">
                <div className="text-4xl mb-3">🔍</div>
                <div className="text-gray-500 font-semibold text-sm">Aucun produit trouvé</div>
                <button onClick={()=>{setSearch('');setActiveCat('Tous')}} className="mt-3 text-partenope-red text-xs underline">Réinitialiser</button>
              </div>
            ):(
              <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2.5 sm:gap-4">
                {filteredProducts.map(p=><ProductCard key={p.id} product={p} onAdd={addToCart}/>)}
              </div>
            )}

            {cart.length>0&&(
              <div className="mt-8 sm:mt-12 p-4 sm:p-6 bg-gradient-to-br from-amber-50 to-orange-50 rounded-2xl sm:rounded-3xl border border-amber-100">
                <h2 className="font-serif text-lg sm:text-xl font-bold text-amber-900 mb-3">✨ Complétez votre commande</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
                  {getUpsell(cart,orders.filter(o=>o.restaurantId===currentRestaurant.id),catalog).map(p=>(
                    <ProductCard key={p.id} product={p} onAdd={addToCart} compact/>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {role==='client'&&view==='orders'&&(
          <div>
            <h2 className="font-serif text-xl sm:text-2xl font-bold text-gray-900 mb-4">Mes commandes</h2>
            <OrderHistory orders={orders.filter(o=>o.restaurantId===currentRestaurant.id)} onRepeatOrder={handleRepeatOrder} onTrack={(id)=>setTrackingId(id)}/>
          </div>
        )}

        {role==='client'&&view==='loyalty'&&(
          <div>
            <h2 className="font-serif text-xl sm:text-2xl font-bold text-gray-900 mb-4">Programme de fidélité</h2>
            <LoyaltyDashboard loyalty={loyalty}/>
          </div>
        )}
      </main>

      {/* ── MOBILE BOTTOM NAV (client only) ── */}
      {role==='client'&&!showCart&&!showCheckout&&!trackingId&&(
        <nav className="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-30 bottom-nav">
          <div className="flex items-center justify-around py-1.5">
            {[['catalog','🏪','Catalogue'],['orders','📦','Commandes'],['loyalty','⭐','Fidélité']].map(([v,ico,label])=>(
              <button key={v} onClick={()=>setView(v)} className={`flex flex-col items-center gap-0.5 px-3 py-1 ${view===v?'text-partenope-red':'text-gray-400'}`}>
                <span className="text-lg">{ico}</span>
                <span className="text-[10px] font-semibold">{label}</span>
              </button>
            ))}
          </div>
        </nav>
      )}

      {/* Desktop nav (client) */}
      {role==='client'&&(
        <div className="hidden sm:block sticky top-[52px] z-30 bg-white/95 backdrop-blur-sm border-b border-gray-100">
          <div className="max-w-7xl mx-auto px-4">
            <nav className="flex items-center gap-1 py-1.5">
              {[['catalog','🏪 Catalogue'],['orders','📦 Mes commandes'],['loyalty','⭐ Fidélité']].map(([v,l])=>(
                <button key={v} onClick={()=>setView(v)} className={`px-3 py-1.5 rounded-lg text-sm font-semibold transition-all ${view===v?'bg-partenope-red text-white shadow-sm':'text-gray-600 hover:bg-gray-100'}`}>{l}</button>
              ))}
            </nav>
          </div>
        </div>
      )}

      {showCart&&<CartSidebar cart={cart} setCart={setCart} catalog={catalog} orderHistory={orders.filter(o=>o.restaurantId===currentRestaurant.id)} loyalty={loyalty} onCheckout={handleCheckout} onClose={()=>setShowCart(false)}/>}

      {/* Footer */}
      <footer className="bg-gray-900 text-gray-400 py-6 sm:py-8 mt-8 sm:mt-16 hidden sm:block">
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex flex-col sm:flex-row items-center justify-between gap-3">
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-lg bg-partenope-red flex items-center justify-center"><span className="text-white font-bold font-serif text-sm">P</span></div>
              <span className="font-serif text-white font-bold">Partenope</span>
            </div>
            <div className="text-xs text-center">Produits alimentaires italiens · Paris & IDF</div>
            <div className="flex items-center gap-2 text-xs"><span>🇮🇹 Depuis 1987</span><span>·</span><span>📞 01 23 45 67 89</span></div>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
